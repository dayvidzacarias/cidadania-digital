<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concurso Agrinho 2026 | Educação e Campo</title>
    <style>
        /* --- Configurações Globais --- */
        :root {
            --cor-primaria: #2e7d32; /* Verde Agrinho */
            --cor-secundaria: #f9a825; /* Amarelo Sol / Campo */
            --bg-claro: #f1f8e9;
            --texto-escuro: #263238;
            --branco: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-claro);
            color: var(--texto-escuro);
            line-height: 1.6;
        }

        /* --- Cabeçalho (Header) --- */
        header {
            background-color: var(--cor-primaria);
            color: var(--branco);
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 5px solid var(--cor-secundaria);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
